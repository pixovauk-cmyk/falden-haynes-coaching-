session_h2: This is what you get. Every time.
session_sub: Every bundle. Every session. No exceptions.
session_f1_title: Recorded every time
session_f1_body: Full replay in your inbox. Revisit any moment, any time.
session_f2_title: Action plan the same day
session_f2_body: Not next week. Written and in your inbox before you sleep.
session_f3_title: I'm reachable between sessions
session_f3_body: Drop me a message when something comes up. I respond within 48 hours.
about_chip: About Feldon
about_h2: I've started 35 businesses. Now I help you build yours.
about_body1: >-
  I know what it's like to have an idea you believe in and not know where to
  take it next. I've also built businesses from scratch. Made the mistakes,
  figured out what works, and come out the other side with something real.
about_body2: >-
  That's what I bring to every session. Not theory. Not frameworks from a book.
  Real experience from someone who's been in the same position and found a way
  through.
