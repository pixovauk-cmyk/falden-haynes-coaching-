prob_chip: Who it's for
prob_h2: Is this you?
prob_intro: Four types of founders come through my door. One of them is you.
prob_card1_chip: Aspiring Founder
prob_card1_title: You've got the idea. Now what?
prob_card1_body: >-
  You know you want to build something, but you don't know where to start. I'll
  help you turn it into a plan you can follow.
prob_card2_chip: Early-Stage Founder
prob_card2_title: You've started. Now it gets real.
prob_card2_body: >-
  The first steps are done. Now you're in the messy middle: money, systems,
  customers, all at once. Let's cut through it.
prob_card3_chip: Stuck Founder
prob_card3_title: You're running. But something's off.
prob_card3_body: >-
  Growth has stalled or the business feels harder than it should. I'll help you
  find out why, and fix it.
prob_card4_chip: Business Owner
prob_card4_title: Established. Now let's build on it.
prob_card4_body: >-
  Your business is running. But there's more: scaling, systemising, or just
  getting your time back. I can help with all of it.
