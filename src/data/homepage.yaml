steps_chip: How it works
steps_h2: 3 easy steps
step1_title: Got your idea?
step1_body: >-
  You have something in mind — a business, a project, a change you want to make.
  That is the starting point. Bring it as it is. Half-formed is fine.
step2_title: Choose the pack that suits your idea
step2_body: >-
  Not sure which package fits? Take the quick quiz and I will point you in the
  right direction.
step2_link: Take the quiz
step3_title: Get a plan to bring your idea to life
step3_body: >-
  Real, structured, actionable. A plan built around your idea, your resources,
  and what you want to achieve.
step3_link: Book a free call
