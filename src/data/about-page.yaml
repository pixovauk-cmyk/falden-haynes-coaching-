story_chip: My journey
story_h2: |-
  Where I came from.
  And why I coach.
story_sub: A story that starts earlier than most. And gets more honest along the way.
m1_tag: The start
m1_h3: 'I didn''t wait for permission and overcome obstacles on the way '
m1_body1: >-
  I started my first business when I was in secondary school; most people my age
  were still figuring out what they wanted to study for A levels. Starting a
  baking business outside of school and utilising my bus fare to run a shop
  outside my school bag. That was a choice, and it came with everything you'd
  expect. The excitement. The mistakes. The moments of genuine progress, and the
  moments where it all felt like it was going backwards
m1_body2: >-
  Raised in the West Midlands, left halfway across the country to the south, it
  got boring, and I missed the West Midlands buzz, community and diversity.
  Returning and being reconnected to the community and being a proud
  #Brumbassidor.
m2_tag: Bring it up to now
m2_h3: 35 businesses later. Not all of them worked.
m2_body1: >-
  I've now started 35 businesses. They haven't all worked. That's the bit most
  coaches won't tell you. But it's also the bit that matters most. Because you
  don't get real business knowledge from the ones that went smoothly. You get it
  from figuring out what went wrong and what you'd do differently next venture. 
m2_body2: >-
  I've worked on businesses from quick-win side hustles to rocky escapes and
  national businesses. Delivering talks at the Birmingham Library, online
  webinars and universities. Being in the right place and right time with the
  right people who are trying to build something impactful. 
m3_tag: Why I coach
m3_h3: I got tired of watching talented people get stuck.
m3_body1: >-
  It came from watching talented, motivated people get stuck in exactly the same
  places. Not because they lacked ability, but because no one had helped them
  turn what was in their head into a structured plan.
m3_body2: That's what I do. And that's why I do it.
m3_cta: 'Book a free session '
mvv_chip: The bigger picture
mvv_h2: Mission, Vision & Values
mission_body: >-
  We exist to make entrepreneurship practical and achievable through
  action-focused coaching and structured planning, helping startup founders
  seize opportunities, understand the responsibilities and realities of business
  ownership, and build successful ventures that create meaningful impact.
vision_body: >-
  We envision a future where entrepreneurial success is driven by preparation
  rather than chance, reducing business failure by equipping founders with the
  planning, co-support, and confidence needed to build sustainable and impactful
  businesses.
value1_title: Always be growing
value1_body: >-
  Committed to learning, experimenting and finding the right people to be better
  than yesterday
value2_title: Follow up when needed
value2_body: >-
  Always being committed to deliver what is promised, a phone call to see how
  things are going, a email with a video explaining a concept in a bit more
  detail, being from start to finish. 
value3_title: Listen for clarity
value3_body: >-
  Actively listening to get to the rout of the issue, fully understanding the
  situation to give the best advice possible 
hw_chip: How I work
hw_h2: Just honest work.
hw_sub: What you get from me, every session, every client, no exceptions.
hw_card1_title: I come prepared.
hw_card1_body: >-
  Before every session, I ask what you would like to focus on. I prepare for the
  specific situation that you are facing in your journey. You are not starting
  over with each session you are having contextual knowledge of your bigger
  picture 
hw_card2_title: I'll tell you what I actually think.
hw_card2_body: >-
  If I identify a gap in the idea, I'll say so. Not to be mean, not to stop you
  but to encourage a clearer image of the idea. I believe that Honest input is
  more useful than comfortable agreement. 
hw_card3_title: You leave with a plan.
hw_card3_body: >-
  Every session ends with a written action plan in your inbox. Any resources,
  videos, or links promised are in your inbox or written down for you. It is
  good enough to have a plan, but you need to know how to action it. 
hw_footer_text: >-
  I've deliver workshops at the Birmingham Library, regular online webinars
  outside working hours. I want to make sure that everyone has the opportunity
  to launch a business that they are passionate about. 
hw_footer_cta: 'Book a free session '
