story_chip: My journey
story_h2: "Where I came from.\nAnd why I coach."
story_sub: >-
  A story that starts earlier than most. And gets more honest along the way.
m1_tag: The start
m1_h3: I didn't wait for permission.
m1_body1: >-
  I started my first business when most people my age were still figuring out
  what they wanted to study. That was a choice, and it came with everything
  you'd expect. The excitement. The mistakes. The moments of genuine
  progress, and the moments where it all felt like it was going backwards.
m1_body2: >-
  Raised in the West Midlands, this community has always been part of how I
  think and operate.
m2_tag: The real bit
m2_h3: 35 businesses. Not all of them worked.
m2_body1: >-
  I've now started 35 businesses. They haven't all worked. That's the bit
  most coaches won't tell you. But it's also the bit that matters most.
  Because you don't get real business knowledge from the ones that went
  smoothly. You get it from figuring out what went wrong and what you'd do
  differently.
m2_body2: >-
  The West Midlands is where I grew up, where I built my businesses, and
  where I'm based now. I've worked with the Black Country Chamber of
  Commerce, delivered workshops at the University of Warwick Science Park,
  and spent time in rooms with people who are trying to build something real.
m3_tag: Why I coach
m3_h3: I got tired of watching talented people get stuck.
m3_body1: >-
  When I started coaching, it wasn't a pivot or a next step. It came from
  watching talented, motivated people get stuck in exactly the same places.
  Not because they lacked ability, but because no one had helped them turn
  what was in their head into a structured plan.
m3_body2: "That's what I do. And that's why I do it."
m3_cta: Book a free call

mvv_chip: The why behind the work
mvv_h2: Mission, Vision & Values
mission_body: >-
  I started this to make entrepreneurship practical and achievable through
  action-focused coaching and structured planning, helping startup founders
  seize opportunities and build successful ventures that create meaningful impact.
vision_body: >-
  A future where entrepreneurial success is driven by preparation rather than
  chance. More start-up businesses in the UK solving real problems, equipped
  with the planning and confidence to build businesses that last.
value1_title: Always be growing
value1_body: committed to learning, experimenting and finding the right people.
value2_title: Follow up when needed
value2_body: a call to keep you on track with what you are doing.
value3_title: Listen for clarity
value3_body: gaining clarity to provide the best advice possible.

hw_chip: How I work
hw_h2: "No theory. No fluff.\nJust honest work."
hw_sub: "What you get from me, every session, every client, no exceptions."
hw_card1_title: I come prepared.
hw_card1_body: >-
  Before every session, I've thought about your specific situation, not just
  your industry. You're never starting from scratch.
hw_card2_title: I'll tell you what I actually think.
hw_card2_body: >-
  If the idea has a gap, I'll say so. Honest input is more useful than
  comfortable agreement.
hw_card3_title: You leave with a plan.
hw_card3_body: >-
  Every session ends with a written action plan in your inbox, the same day.
  Not a vague list. A real plan you can act on.
hw_footer_text: >-
  I've delivered workshops at the University of Warwick Science Park, worked
  with the Black Country Chamber of Commerce, and spent years in rooms with
  people who are trying to build something real. The West Midlands business
  community matters to me. Genuinely.
hw_footer_cta: Book a free call

cred_chip: Why trust me
cred_h2: "Real experience.\nReal recognition."
cred_intro: "Here's what I've built and earned. And what it means for the founders I work with."
award_h3: Awarded for entrepreneurial perseverance.
award_body1: >-
  The EPIC Spirit Award recognises founders who keep building through real
  adversity. Not the overnight success stories. The ones who hit genuine
  setbacks and pushed through anyway.
award_body2: >-
  It's the most personally meaningful recognition I've received. Because it's
  about character, not just revenue.
award_pullquote: "My mum always told me: my smile is my biggest selling point."
