award_h3: Awarded for entrepreneurial perseverance.
award_body1: >-
  The EPIC Spirit Award is given through the judges' choice category,
  celebrating entrepreneurs whose exceptional passion, resilience, or impact has
  stood out across any category, embodying the true spirit of entrepreneurship
  and inspiring others along the way. 
award_body2: >-
  It's the most personally meaningful recognition I've received. Because it's
  about character, not just revenue.
award_pullquote: 'My mum always told me: my smile is my biggest selling point.'
